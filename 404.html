<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تمرين — افتح التمرين في التطبيق</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />

  <!-- Open Graph (WhatsApp, Facebook, …) — shown when an /event/{id} link is shared -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="تمرين" />
  <meta property="og:locale" content="ar_SA" />
  <meta property="og:title" content="تمرين — افتح التمرين في التطبيق" />
  <meta property="og:description" content="افتح هذا التمرين في تطبيق تمرين وانضم إليه." />
  <meta property="og:url" content="https://guileless-squirrel-b6537a.netlify.app/" />
  <meta property="og:image" content="https://guileless-squirrel-b6537a.netlify.app/assets/og-image.png?v=2" />
  <meta property="og:image:secure_url" content="https://guileless-squirrel-b6537a.netlify.app/assets/og-image.png?v=2" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="تطبيق تمرين — استضف وانضم لتمارين جماعية" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="تمرين — افتح التمرين في التطبيق" />
  <meta name="twitter:description" content="افتح هذا التمرين في تطبيق تمرين وانضم إليه." />
  <meta name="twitter:image" content="https://guileless-squirrel-b6537a.netlify.app/assets/og-image.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { brand: { green:'#1FA64D', vivid:'#2FBF4E', deep:'#15833C', blue:'#2F6BFF', ink:'#0C1322', muted:'#5B6675', soft:'#F4F7F9', line:'#E7ECF1' } },
      fontFamily: { ar:['Tajawal','system-ui','sans-serif'], en:['Inter','system-ui','sans-serif'] },
    } } };
  </script>
  <style> body { font-family:'Tajawal',system-ui,sans-serif; } </style>
</head>
<body class="min-h-screen bg-white text-brand-ink antialiased">
  <main class="relative mx-auto flex min-h-screen max-w-lg flex-col items-center justify-center px-6 text-center">
    <div class="pointer-events-none absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-24 start-1/2 h-72 w-72 -translate-x-1/2 rounded-full bg-brand-vivid/20 blur-3xl"></div>
    </div>

    <img src="/assets/tamrin-icon.png" alt="تمرين" class="h-20 w-20 rounded-[22%] shadow-lg" />

    <!-- Generic 404 (default) -->
    <div id="generic">
      <h1 class="mt-8 text-5xl font-black text-brand-green">٤٠٤</h1>
      <h2 class="mt-3 text-2xl font-extrabold">الصفحة غير موجودة</h2>
      <p class="mt-3 text-brand-muted">عذرًا، لم نتمكن من العثور على الصفحة التي تبحث عنها.</p>
    </div>

    <!-- Event deep-link fallback (shown when path is /event/...) -->
    <div id="event" class="hidden">
      <h2 class="mt-8 text-2xl font-black sm:text-3xl">افتح هذا التمرين في التطبيق</h2>
      <p class="mt-3 text-brand-muted">لعرض تفاصيل التمرين والانضمام إليه، حمّل تطبيق تمرين على جهازك.</p>
      <p id="eventId" class="mt-2 text-sm font-bold text-brand-deep"></p>
    </div>

    <div class="mt-8 flex flex-col items-center gap-3 sm:flex-row">
      <a href="#" class="inline-flex items-center gap-3 rounded-2xl bg-brand-ink px-5 py-3 text-white transition hover:opacity-90">
        <svg class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.42 2.2-1.12 2.98-.84.94-2.2 1.66-3.34 1.57-.13-1.12.43-2.3 1.1-3.03.78-.86 2.16-1.5 3.36-1.52zM20.5 17.2c-.6 1.38-.88 2-1.66 3.22-1.08 1.7-2.6 3.82-4.48 3.84-1.67.02-2.1-1.1-4.37-1.08-2.27.01-2.74 1.1-4.42 1.07-1.88-.03-3.32-1.94-4.4-3.64-3.02-4.77-3.34-10.36-1.47-13.33 1.32-2.1 3.42-3.34 5.39-3.34 2.01 0 3.27 1.1 4.93 1.1 1.61 0 2.59-1.1 4.92-1.1 1.76 0 3.62.96 4.95 2.62-4.35 2.38-3.64 8.58.01 10.54z"/></svg>
        <span class="text-start leading-none"><span class="block text-[11px] font-medium opacity-80">حمّله من</span><span class="mt-1 block text-lg font-bold">App Store</span></span>
      </a>
      <a href="/" class="inline-flex items-center justify-center rounded-2xl border border-brand-line bg-white px-5 py-3.5 font-bold text-brand-ink transition hover:bg-brand-soft">العودة للرئيسية</a>
    </div>
  </main>

  <script>
    (function () {
      var m = location.pathname.match(/^\/event\/([^\/?#]+)/);
      if (m) {
        document.getElementById('generic').classList.add('hidden');
        document.getElementById('event').classList.remove('hidden');
        document.title = 'تمرين — تفاصيل التمرين';
        var id = decodeURIComponent(m[1]);
        if (id) document.getElementById('eventId').textContent = 'رقم التمرين: ' + id;
      }
    })();
  </script>
</body>
</html>
